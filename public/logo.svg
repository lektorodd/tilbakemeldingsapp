<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="white"/>

  <!-- Bar Chart -->
  <!-- Bar 1 (shortest) -->
  <rect x="64" y="320" width="80" height="128" fill="black" rx="4"/>

  <!-- Bar 2 (medium-short) -->
  <rect x="160" y="240" width="80" height="208" fill="black" rx="4"/>

  <!-- Bar 3 (tallest) -->
